  itr_bits_per_min: 17.39
preprocessing:
  artifact_methods:
  - threshold-based artifact rejection
  bandpass:
    high_cutoff_hz: 250.0
    low_cutoff_hz: 0.1
  data_state: filtered
  downsampled_to_hz: 100.0
  epoch_window:
  - -0.15
  - 0.8
  filter_type: 'Chebyshev II order 8 (for visual inspection: 30 Hz pass, 42 Hz stop, 50 dB damping)'
  highpass_hz: 0.1
  lowpass_hz: 250.0
  notch_hz:
  - 50
  notes: 'Raw data acquired at 1000 Hz. For visual inspection: low-pass filtered with order 8 Chebyshev II filter (30 Hz pass,
    42 Hz stop, 50 dB damping) applied forward and backward to minimize phase shifts, then downsampled to 100 Hz. For classification:
    same filter applied causally (forward only) for online portability. Artifact rejection used simple threshold method: subtrials
    with deflection >70 µV over ocular channels compared to baseline were rejected.'
  preprocessing_applied: true
  preprocessing_steps:
  - bandpass filter
  - notch filter
  - downsampling
  - artifact rejection
  re_reference: nose
