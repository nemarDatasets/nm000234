  n_classes: 2
  paradigm: p300
  primary_modality: auditory
  stimulus_modalities:
  - auditory
  stimulus_type: auditory_spatial
  study_design: 'Offline auditory oddball task using spatial location of auditory stimuli as discriminating cue. Frontal five
    speakers used (speakers 1,2,3,7,8) with 45 degree spacing. Three conditions tested: C300 (300ms ISI), C175 (175ms ISI),
    C300s (300ms ISI, single speaker). Each stimulus was unique 40ms complex sound from bandpass filtered white noise with
    tone overlay.'
